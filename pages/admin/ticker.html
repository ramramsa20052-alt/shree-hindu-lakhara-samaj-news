    <link rel="stylesheet" href="../../assets/css/admin.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand"><span>🕉️</span> Admin Portal</div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" class="menu-item">📊 Dashboard</a></li>
            <li><a href="posts.html" class="menu-item">📰 Manage Posts</a></li>
            <li><a href="rajasthan.html" class="menu-item">🏙️ Rajasthan News</a></li>
            <li><a href="society.html" class="menu-item">📜 Society News</a></li>
            <li><a href="gallery.html" class="menu-item">📸 Gallery</a></li>
            <li><a href="events.html" class="menu-item">📅 Events</a></li>
            <li><a href="notices.html" class="menu-item">📢 Notices</a></li>
            <li><a href="ticker.html" class="menu-item active">⚡ Ticker Settings</a></li>
            <li><a href="members.html" class="menu-item">👥 Members</a></li>
            <li><a href="../../index.html" class="menu-item">🌐 View Site</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>⚡ Live Ticker Management</h2>
            <div class="user-profile"><div class="avatar">AD</div><span>Administrator</span></div>
        </div>

        <div class="content-card">
            <div class="card-header">
                <h3>Ticker Feed Control</h3>
                <button class="btn btn-primary" onclick="saveTicker()">Update Feed</button>
            </div>
            <div class="form-group">
                <label>Scrolling Message 1 (Hindi)</label>
                <input type="text" id="ticker1" class="form-control">
            </div>
            <div class="form-group">
                <label>Scrolling Message 2 (Hindi)</label>
                <input type="text" id="ticker2" class="form-control">
            </div>
        </div>
    </div>

    <script src="../../assets/js/data-manager.js"></script>
    <script>
        // Load current data
        const ticker = LakharaData.getTicker();
        document.getElementById('ticker1').value = ticker[0] || "";
        document.getElementById('ticker2').value = ticker[1] || "";

        function saveTicker() {
            const t1 = document.getElementById('ticker1').value;
            const t2 = document.getElementById('ticker2').value;
            LakharaData.updateTicker([t1, t2]);
            alert("Website Ticker Updated Successfully!");
        }
    </script>
</body>
</html>
